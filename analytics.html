<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Analytics</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body class="main-body">
    <div class="container py-4">

<h2 class="mb-4">Mood Analytics</h2>

<div class="row g-3 mb-4">

<div class="col-md-4">
<div class="analytics-card text-center">
<h3>14</h3>
<p>Day Streak</p>
</div>
</div>

<div class="col-md-4">
<div class="analytics-card text-center">
<h3>😊</h3>
<p>Average Mood</p>
</div>
</div>
<div class="col-md-4">
<div class="analytics-card text-center">
<h3>83%</h3>
<p>Happy Days</p>
</div>
</div>

</div>

<div class="card-box p-4 mb-4">

<h5>Mood This Week</h5>

<canvas id="moodChart"></canvas>

</div>
<div class="card-box p-4 mb-4">

<h5>Emotion Breakdown</h5>

<canvas id="pieChart"></canvas>

</div>

<div class="insight-card p-4">

<h5>Insight of the Week</h5>

<p>
You feel happiest on Thursdays after completing your weekly goals.
Keep following your productive routines.
</p>

</div>
</div>

<script src="js/app.js"></script>

</body>
</html>
