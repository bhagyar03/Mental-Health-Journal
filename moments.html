<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Important Moments</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>
<body class="main-body">

<div class="container py-4">

<h2 class="mb-4">Important Moments</h2>

<div class="card-box p-4 mb-4">

<input type="file" class="form-control mb-3">

<input type="text"
class="form-control mb-3"
placeholder="Moment Title">

<textarea class="form-control mb-3"
placeholder="Describe this special memory..."></textarea>

<button class="btn custom-btn">
Save Memory
</button>
</div>

<div class="memory-gallery">

<div class="memory-card">
<img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1200&auto=format&fit=crop"
class="img-fluid rounded">

<h5 class="mt-3">Beach Walk</h5>

<p>A calm evening that improved my mood.</p>
</div>

</div>

</div>

</body>
</html>
