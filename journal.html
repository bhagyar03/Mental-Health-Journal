<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Journal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>
<body class="main-body">

<div class="container py-4">

    <div class="card-box p-4">

        <h2 class="mb-4">Daily Journal</h2>

        <input type="date" class="form-control mb-4">

        <div class="mood-tags mb-4">

            <span class="tag happy">Happy</span>
            <span class="tag sad">Sad</span>
            <span class="tag calm">Calm</span>
            <span class="tag stress">Stressed</span>

        </div>
                <div class="mb-3">

            <label>Choose Font</label>

            <select class="form-control">
                <option>Times New Roman</option>
                <option>Arial</option>
                <option>Georgia</option>
            </select>

        </div>

        <div class="mb-3">

            <label>Choose Text Color</label>

            <input type="color" class="form-control form-control-color">

        </div>
         <textarea class="form-control journal-area"
                  placeholder="Write your thoughts here..."></textarea>

        <div class="tags-section mt-4">

            <span class="small-tag">productivity</span>
            <span class="small-tag">exercise</span>
            <span class="small-tag">self-care</span>
            <span class="small-tag">work</span>

        </div>

        <div class="ai-box mt-4 p-3">

            <h5>AI Insight</h5>

            <p>
                Writing before sleep appears to improve your emotional clarity.
                Try maintaining this habit daily.
            </p>

            </div>

        <button class="btn custom-btn mt-4 w-100">
            Save Journal
        </button>

    </div>

</div>

</body>
</html>
